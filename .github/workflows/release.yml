name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  APP_NAME: TibiaHuntMaster
  APP_PROJECT: TibiaHuntMaster.App/TibiaHuntMaster.App.csproj

jobs:
  guard:
    name: Guard Release Execution
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.guard.outputs.should_run }}

    steps:
      - name: Evaluate release guard
        id: guard
        shell: bash
        env:
          RELEASE_ENABLED: ${{ vars.RELEASE_ENABLED }}
          RELEASE_REPOSITORY: ${{ vars.RELEASE_REPOSITORY }}
        run: |
          should_run="false"

          if [ "$RELEASE_ENABLED" = "true" ] && [ -n "$RELEASE_REPOSITORY" ] && [ "${{ github.repository }}" = "$RELEASE_REPOSITORY" ]; then
            should_run="true"
          fi

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"

  tests:
    name: Run Tests
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore Dependencies
        run: dotnet restore

      - name: Run Tests
        run: dotnet test TibiaHuntMaster.sln --no-restore --verbosity normal --filter "Category!=Online"

  build-windows:
    name: Build Windows (win-x64)
    if: needs.guard.outputs.should_run == 'true'
    needs: [guard, tests]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore RID assets
        run: dotnet restore ${{ env.APP_PROJECT }} -r win-x64

      - name: Publish win-x64 (no debug symbols)
        shell: pwsh
        run: |
          $appVersion = "${env:GITHUB_REF_NAME}" -replace '^v', ''
          dotnet publish ${{ env.APP_PROJECT }} `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -p:Version=$appVersion `
            -o ./publish/win-x64

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build Setup.exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ./release-artifacts/win | Out-Null

          $appVersion = "${env:GITHUB_REF_NAME}" -replace '^v', ''
          $publishDir = (Resolve-Path ./publish/win-x64).Path
          $outputDir = (Resolve-Path ./release-artifacts/win).Path
          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"

          & $iscc `
            "/DAppVersion=$appVersion" `
            "/DPublishDir=$publishDir" `
            "/DOutputDir=$outputDir" `
            "/DMainExecutable=TibiaHuntMaster.App.exe" `
            packaging/windows/TibiaHuntMaster.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-win-x64
          path: release-artifacts/win/TibiaHuntMaster-Setup.exe

  build-linux-appimage:
    name: Build Linux AppImage (linux-x64)
    if: needs.guard.outputs.should_run == 'true'
    needs: [guard, tests]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore RID assets
        run: dotnet restore ${{ env.APP_PROJECT }} -r linux-x64

      - name: Publish linux-x64 (no debug symbols)
        run: |
          APP_VERSION="${GITHUB_REF_NAME#v}"
          dotnet publish ${{ env.APP_PROJECT }} \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -p:Version=$APP_VERSION \
            -o ./publish/linux-x64

      - name: Build AppDir structure
        run: |
          mkdir -p AppDir/usr/bin
          cp -a ./publish/linux-x64/. AppDir/usr/bin/

          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/TibiaHuntMaster.App" "$@"
          EOF
          chmod +x AppDir/AppRun

          cat > AppDir/TibiaHuntMaster.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=TibiaHuntMaster
          Exec=TibiaHuntMaster.App
          Icon=tibiahuntmaster
          Categories=Game;Utility;
          Terminal=false
          EOF

          cp TibiaHuntMaster.App/Assets/logo.png AppDir/tibiahuntmaster.png
          cp TibiaHuntMaster.App/Assets/logo.png AppDir/.DirIcon

      - name: Build AppImage
        run: |
          curl -L -o appimagetool-x86_64.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run \
            AppDir TibiaHuntMaster-linux-x64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-appimage
          path: TibiaHuntMaster-linux-x64.AppImage

  build-macos:
    name: Build macOS (${{ matrix.rid }})
    if: needs.guard.outputs.should_run == 'true'
    needs: [guard, tests]
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [osx-x64, osx-arm64]

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore RID assets
        run: dotnet restore ${{ env.APP_PROJECT }} -r ${{ matrix.rid }}

      - name: Publish ${{ matrix.rid }} (no debug symbols)
        run: |
          APP_VERSION="${GITHUB_REF_NAME#v}"
          dotnet publish ${{ env.APP_PROJECT }} \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -p:Version=$APP_VERSION \
            -o ./publish/${{ matrix.rid }}

      - name: Build .app bundle
        run: |
          APP_VERSION="${GITHUB_REF_NAME#v}"
          APP_BUNDLE_ROOT="./bundle/${{ matrix.rid }}/TibiaHuntMaster.app"
          APP_CONTENTS="$APP_BUNDLE_ROOT/Contents"
          APP_MACOS="$APP_CONTENTS/MacOS"
          APP_RESOURCES="$APP_CONTENTS/Resources"

          mkdir -p "$APP_MACOS" "$APP_RESOURCES"
          cp -a ./publish/${{ matrix.rid }}/. "$APP_MACOS/"
          cp TibiaHuntMaster.App/Assets/logo.png "$APP_RESOURCES/logo.png"

          cat > "$APP_CONTENTS/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleDisplayName</key>
            <string>TibiaHuntMaster</string>
            <key>CFBundleExecutable</key>
            <string>TibiaHuntMaster.App</string>
            <key>CFBundleIdentifier</key>
            <string>eu.tibiafun.tibiahuntmaster</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>TibiaHuntMaster</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>$APP_VERSION</string>
            <key>CFBundleVersion</key>
            <string>$APP_VERSION</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

          chmod +x "$APP_MACOS/TibiaHuntMaster.App"
          codesign --force --deep --sign - "$APP_BUNDLE_ROOT"

      - name: Package DMG
        run: |
          DMG_ROOT="./dmg-root/${{ matrix.rid }}"
          APP_BUNDLE="./bundle/${{ matrix.rid }}/TibiaHuntMaster.app"

          mkdir -p "$DMG_ROOT"
          cp -a "$APP_BUNDLE" "$DMG_ROOT/"
          ln -s /Applications "$DMG_ROOT/Applications"

          hdiutil create \
            -volname "TibiaHuntMaster" \
            -srcfolder "$DMG_ROOT" \
            -ov \
            -format UDZO \
            "TibiaHuntMaster-${{ matrix.rid }}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: TibiaHuntMaster-${{ matrix.rid }}.dmg

  create-release:
    name: Create GitHub Release
    if: needs.guard.outputs.should_run == 'true'
    needs: [guard, build-windows, build-linux-appimage, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Generate checksums and updater manifest
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF_NAME}"
          VERSION="${TAG_NAME#v}"
          REPO="${GITHUB_REPOSITORY}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG_NAME}"

          cd release-assets

          sha256sum ./* > checksums.txt

          python3 <<'PY'
          import hashlib
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          tag_name = os.environ["GITHUB_REF_NAME"]
          version = tag_name[1:] if tag_name.startswith("v") else tag_name
          repo = os.environ["GITHUB_REPOSITORY"]
          base_url = f"https://github.com/{repo}/releases/download/{tag_name}"

          files = {
              "windowsX64": "TibiaHuntMaster-Setup.exe",
              "linuxX64": "TibiaHuntMaster-linux-x64.AppImage",
              "osxX64": "TibiaHuntMaster-osx-x64.dmg",
              "osxArm64": "TibiaHuntMaster-osx-arm64.dmg",
          }

          manifest = {
              "version": version,
              "tag": tag_name,
              "channel": "stable",
              "publishedAtUtc": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
              "releasePageUrl": f"https://github.com/{repo}/releases/tag/{tag_name}",
          }

          for key, filename in files.items():
              path = Path(filename)
              if not path.exists():
                  continue

              sha256 = hashlib.sha256(path.read_bytes()).hexdigest()
              manifest[key] = {
                  "fileName": filename,
                  "url": f"{base_url}/{filename}",
                  "sha256": sha256,
              }

          Path("latest.json").write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Publish release assets
        uses: softprops/action-gh-release@v3
        with:
          files: release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build updater feed site
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p pages-site/stable
          cp release-assets/latest.json pages-site/stable/latest.json

          cat > pages-site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>TibiaHuntMaster Release Feed</title>
          </head>
          <body>
            <main>
              <h1>TibiaHuntMaster Release Feed</h1>
              <p>This site hosts updater metadata for TibiaHuntMaster.</p>
              <ul>
                <li><a href="./stable/latest.json">stable/latest.json</a></li>
              </ul>
            </main>
          </body>
          </html>
          EOF

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages-site

  deploy-feed:
    name: Deploy updater feed to GitHub Pages
    if: needs.guard.outputs.should_run == 'true'
    needs: [guard, create-release]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
