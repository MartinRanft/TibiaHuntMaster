name: Verify

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build Solution
        run: dotnet build TibiaHuntMaster.sln --no-restore --configuration Release

      - name: Run Tests with Coverage
        run: |
          dotnet test TibiaHuntMaster.sln \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --filter "Category!=Online" \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./artifacts/test-results \
            --collect:"XPlat Code Coverage"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-test-results
          path: ./artifacts/test-results/**/*.trx
          if-no-files-found: warn

      - name: Upload Coverage Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-coverage-results
          path: ./artifacts/test-results/**/coverage.cobertura.xml
          if-no-files-found: warn
