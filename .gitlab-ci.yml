workflow:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'

stages:
  - mirror

mirror_to_github:
  stage: mirror
  image: alpine/git:2.47.1
  variables:
    GIT_STRATEGY: fetch
    GIT_DEPTH: "0"
    ENABLE_GITHUB_ORG_MIRROR: "false"
    GITHUB_PUBLIC_BRANCH: "master"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'
  before_script:
    - test -n "$GITHUB_MIRROR_TOKEN"
    - test -n "$GITHUB_PERSONAL_MIRROR_REPOSITORY"
    - |
      if [ "$ENABLE_GITHUB_ORG_MIRROR" = "true" ]; then
        test -n "$GITHUB_ORG_MIRROR_REPOSITORY"
      fi
    - git config --global user.name "GitLab CI"
    - git config --global user.email "ci@gitlab"
    - git fetch origin --tags
  script:
    - |
      set -eu

      repositories="$GITHUB_PERSONAL_MIRROR_REPOSITORY"

      if [ "$ENABLE_GITHUB_ORG_MIRROR" = "true" ]; then
        repositories="$repositories $GITHUB_ORG_MIRROR_REPOSITORY"
      fi

      for repository in $repositories; do
        remote_url="https://x-access-token:${GITHUB_MIRROR_TOKEN}@github.com/${repository}.git"
        publish_dir="$(mktemp -d)"

        echo "Publishing release snapshot $CI_COMMIT_TAG to $repository..."

        git init "$publish_dir"
        git -C "$publish_dir" config user.name "GitLab CI"
        git -C "$publish_dir" config user.email "ci@gitlab"
        git -C "$publish_dir" remote add github-public "$remote_url"

        if git -C "$publish_dir" fetch github-public "$GITHUB_PUBLIC_BRANCH" >/dev/null 2>&1; then
          git -C "$publish_dir" checkout -B "$GITHUB_PUBLIC_BRANCH" FETCH_HEAD
        else
          git -C "$publish_dir" checkout --orphan "$GITHUB_PUBLIC_BRANCH"
        fi

        find "$publish_dir" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
        git -C "$CI_PROJECT_DIR" archive --format=tar "$CI_COMMIT_SHA" | tar -xf - -C "$publish_dir"

        git -C "$publish_dir" add -A
        git -C "$publish_dir" commit --allow-empty -m "$CI_COMMIT_TAG"
        git -C "$publish_dir" tag -f "$CI_COMMIT_TAG"

        git -C "$publish_dir" push github-public "HEAD:refs/heads/$GITHUB_PUBLIC_BRANCH"
        git -C "$publish_dir" push github-public "refs/tags/$CI_COMMIT_TAG:refs/tags/$CI_COMMIT_TAG" --force

        rm -rf "$publish_dir"
      done
